[binaries]
c = 'riscv32-unknown-elf-gcc'
ld = 'riscv32-unknown-elf-ld'
strip = 'riscv32-unknown-elf-strip'
objcopy = 'riscv32-unknown-elf-objcopy'
objdump = 'riscv32-unknown-elf-objdump'

[built-in options]
c_args = ['-nostdlib', '-fno-builtin']

[host_machine]
system = 'none'
cpu_family = 'riscv32'
cpu = 'rv32im'
endian = 'little'
